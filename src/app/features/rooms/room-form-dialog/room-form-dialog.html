<h2 mat-dialog-title>{{ isEditMode ? 'Cập nhật phòng' : 'Thêm phòng mới' }}</h2>

<form [formGroup]="form" (ngSubmit)="save()">
  <mat-dialog-content class="flex flex-col gap-1 min-w-[320px]">
    <mat-form-field appearance="outline">
      <mat-label>Tên phòng</mat-label>
      <input matInput formControlName="name" required />
      @if (form.controls.name.hasError('required')) {
        <mat-error>Tên phòng là bắt buộc</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Tầng</mat-label>
      <input matInput type="number" formControlName="floor" required />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Giá thuê (VNĐ)</mat-label>
      <input matInput type="number" formControlName="price" required />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Số người tối đa</mat-label>
      <input matInput type="number" formControlName="maxTenants" required />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Trạng thái</mat-label>
      <mat-select formControlName="status" required>
        @for (item of statuses; track item.value) {
          <mat-option [value]="item.value">{{ item.label }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()">Hủy</button>
    <button mat-flat-button color="primary" type="submit">Lưu</button>
  </mat-dialog-actions>
</form>
